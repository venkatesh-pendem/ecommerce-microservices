spring.application.name=api-gateway
server.port=8080

# ============================================================
# Eureka
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ============================================================
# Routes
# ============================================================
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**,/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/products/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/orders/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# ============================================================
# JWT  (must match user-service secret)
# ============================================================
app.jwt.secret=5A7134743777217A25432A462D4A614E645267556B58703273357638792F423F

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.venkatesh.apigateway=DEBUG

